<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Управление</title>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#000;--card:#1c1c1e;--border:#38383a;--text:#f5f5f7;--muted:#86868b;--accent:#0a84ff;--green:#30d158;--red:#ff453a}body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);padding:20px 28px;max-width:900px;margin:0 auto}a{color:var(--accent);text-decoration:none}h1{font-size:22px;font-weight:700;margin-bottom:24px}.section{background:var(--card);border-radius:16px;padding:20px 24px;margin-bottom:16px}.section h2{font-size:14px;font-weight:700;margin-bottom:14px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}input{background:#2c2c2e;border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none}input:focus{border-color:var(--accent)}input::placeholder{color:var(--muted)}.btn{padding:9px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}.btn-b{background:var(--accent);color:#fff}.btn-r{background:var(--red);color:#fff}.btn-g{background:var(--green);color:#fff}.ri{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;display:flex;justify-content:space-between;font-weight:500}.ri:last-child{border:none}.ri .n{font-weight:700;color:var(--accent)}.ri .u{color:var(--muted);font-size:11px}textarea{width:100%;min-height:180px;background:#2c2c2e;border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:13px;font-family:monospace;outline:none;resize:vertical}textarea:focus{border-color:var(--accent)}.msg{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-top:8px;display:none}.msg.ok{display:block;background:rgba(48,209,88,.1);color:var(--green)}.msg.err{display:block;background:rgba(255,69,58,.1);color:var(--red)}.lock{margin-bottom:16px;background:var(--card);border-radius:16px;padding:16px 24px;display:flex;gap:8px;align-items:center}</style></head><body>
<a href="/">← На главную</a><h1>⚙ Управление</h1>
<div class="lock"><input id="pwd" type="password" placeholder="Пароль администратора" style="flex:1"><button class="btn btn-b" onclick="document.getElementById('pwd').type=document.getElementById('pwd').type==='password'?'text':'password'">👁</button></div>
<div class="section"><h2>➕ Добавить</h2><div class="row"><input id="a-n" placeholder="Имя" style="width:120px"><input id="a-ip" placeholder="http://192.168.1.1" style="width:180px"><input id="a-u" value="admin" style="width:80px"><input id="a-p" placeholder="Пароль" type="password" style="width:110px"><input id="a-dn" placeholder="Красивое имя" style="width:140px"><input id="a-w" placeholder="https://xxx.link" style="width:180px"><button class="btn btn-b" onclick="addR()">+</button></div><div id="am" class="msg"></div></div>
<div class="section"><h2>➖ Удалить</h2><div class="row"><input id="d-n" placeholder="Имя" style="width:180px"><button class="btn btn-r" onclick="delR()">✗</button></div><div id="dm" class="msg"></div></div>
<div class="section"><h2>📋 Роутеры</h2><div id="list">...</div></div>
<div class="section"><h2>✏️ Имена</h2><p style="font-size:12px;color:var(--muted);margin-bottom:10px">имя: Красивое название</p><textarea id="map"></textarea><button class="btn btn-g" onclick="saveMap()" style="margin-top:10px">💾</button><div id="mm" class="msg"></div></div>
<script>
const P=()=>document.getElementById('pwd').value;const H={'Content-Type':'application/json'};function hdr(){return{...H,'X-Admin-Password':P()}}
async function loadR(){const r=await(await fetch('/api/routers')).json();let h='',m=[];for(const[n,c]of Object.entries(r)){h+=`<div class="ri"><span><span class="n">${n}</span> — ${c.display_name||n}</span><span class="u">${c.web_url||c.ip||''}</span></div>`;if(c.display_name)m.push(`${n}: ${c.display_name}`)}document.getElementById('list').innerHTML=h||'<span style="color:var(--muted)">Нет</span>';document.getElementById('map').value=m.join('\n')}
async function addR(){const n=document.getElementById('a-n').value.trim();if(!n)return;const b={ip:document.getElementById('a-ip').value.trim(),user:document.getElementById('a-u').value.trim()||'admin',password:document.getElementById('a-p').value,display_name:document.getElementById('a-dn').value.trim(),web_url:document.getElementById('a-w').value.trim()};try{const r=await fetch(`/api/routers/${n}`,{method:'POST',headers:hdr(),body:JSON.stringify(b)});if(r.ok){sm('am','ok','✅ '+n);loadR()}else{sm('am','err','❌ '+(await r.json()).detail)}}catch(e){sm('am','err','❌ '+e)}}
async function delR(){const n=document.getElementById('d-n').value.trim();if(!n)return;try{const r=await fetch(`/api/routers/${n}`,{method:'DELETE',headers:hdr()});if(r.ok){sm('dm','ok','✅');loadR()}else{sm('dm','err','❌ '+(await r.json()).detail)}}catch(e){sm('dm','err','❌ '+e)}}
async function saveMap(){const lines=document.getElementById('map').value.split('\n').filter(l=>l.includes(':'));let ok=0;const all=await(await fetch('/api/routers')).json();for(const l of lines){const[nm,...rest]=l.split(':');const dn=rest.join(':').trim(),n=nm.trim();if(!n||!dn||!all[n])continue;all[n].display_name=dn;await fetch(`/api/routers/${n}`,{method:'POST',headers:hdr(),body:JSON.stringify(all[n])});ok++}sm('mm','ok',`✅ ${ok}`);loadR()}
function sm(id,c,t){const e=document.getElementById(id);e.className='msg '+c;e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',4000)}
loadR()
</script></body></html>
