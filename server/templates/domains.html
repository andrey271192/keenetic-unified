<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Домены HydraRoute</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--border:#38383a;--text:#f5f5f7;--muted:#86868b;--accent:#0a84ff;--green:#30d158;--red:#ff453a;--yellow:#ffd60a;--orange:#ff9f0a}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);padding:20px 28px;max-width:1100px;margin:0 auto}
a{color:var(--accent);text-decoration:none}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:24px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:8px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--card);color:var(--muted)}
.tab.active{background:var(--accent);color:#fff}
.section{background:var(--card);border-radius:16px;padding:20px 24px;margin-bottom:16px}
.section h2{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.group{background:var(--card2);border-radius:12px;padding:14px}
.group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.group-name{font-weight:700;font-size:13px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.badge-blue{background:rgba(10,132,255,.15);color:var(--accent)}
.badge-green{background:rgba(48,209,88,.15);color:var(--green)}
.badge-red{background:rgba(255,69,58,.15);color:var(--red)}
.badge-yellow{background:rgba(255,214,10,.15);color:var(--yellow)}
.entries{font-size:11px;color:var(--muted);line-height:1.6;max-height:80px;overflow-y:auto;font-family:monospace}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
input,select{background:#2c2c2e;border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn{padding:9px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-b{background:var(--accent);color:#fff}.btn-r{background:var(--red);color:#fff}.btn-g{background:var(--green);color:#000}.btn-o{background:var(--orange);color:#000}
.btn:disabled{opacity:.4;cursor:not-allowed}
textarea{width:100%;min-height:160px;background:#2c2c2e;border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:12px;font-family:monospace;outline:none;resize:vertical}
textarea:focus{border-color:var(--accent)}
.msg{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-top:8px;display:none}
.msg.ok{display:block;background:rgba(48,209,88,.1);color:var(--green)}
.msg.err{display:block;background:rgba(255,69,58,.1);color:var(--red)}
.version{font-size:11px;color:var(--muted);font-family:monospace}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.push-btn{display:flex;gap:8px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.log{background:#1a1a1a;border-radius:10px;padding:12px;font-size:11px;font-family:monospace;color:var(--muted);max-height:120px;overflow-y:auto;margin-top:10px;display:none}
</style></head><body>
<a href="/">← На главную</a>
<div class="topbar" style="margin-top:12px">
  <div>
    <h1>🌐 Домены HydraRoute</h1>
    <div class="sub">Единая конфигурация для всех роутеров · <span id="ver" class="version">...</span></div>
  </div>
  <div class="push-btn">
    <button class="btn btn-b" onclick="pushAll()" id="push-btn">📡 Обновить все роутеры</button>
    <a href="/api/hydra/domain.conf" target="_blank" class="btn btn-o" style="display:inline-flex;align-items:center;text-decoration:none">↓ domain.conf</a>
  </div>
</div>
<div id="push-log" class="log"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('view')">📋 Конфигурация</button>
  <button class="tab" onclick="showTab('import')">⬆ Импорт файлов</button>
</div>

<!-- VIEW TAB -->
<div id="tab-view">
  <div class="section">
    <h2>📄 Группы доменов <span id="dg-count" class="badge badge-blue">0</span></h2>
    <div id="domain-groups" class="grid"></div>
  </div>
  <div class="section">
    <h2>🔢 Группы IP <span id="ig-count" class="badge badge-green">0</span></h2>
    <div id="ip-groups" class="grid"></div>
  </div>
</div>

<!-- IMPORT TAB -->
<div id="tab-import" style="display:none">
  <div class="section">
    <h2>⬆ Импорт domain.conf + ip.list</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Вставь содержимое файлов — формат сохраняется 1:1, порядок важен</p>
    <div class="grid">
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--accent)">domain.conf</div>
        <textarea id="dc-text" placeholder="##groupname&#10;domain1.com,domain2.com/PolicyName"></textarea>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--green)">ip.list</div>
        <textarea id="il-text" placeholder="##groupname&#10;/PolicyName&#10;1.2.3.0/24"></textarea>
      </div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-b" onclick="importFiles()">💾 Сохранить на сервер</button>
      <button class="btn btn-g" onclick="importAndPush()">💾📡 Сохранить + обновить все роутеры</button>
    </div>
    <div id="im" class="msg"></div>
  </div>
  <div class="section">
    <h2>📤 Экспорт текущей конфигурации</h2>
    <div class="grid">
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--accent)">domain.conf</div>
        <textarea id="dc-export" readonly></textarea>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--green)">ip.list</div>
        <textarea id="il-export" readonly></textarea>
      </div>
    </div>
  </div>
</div>

<script>
const POLICY_COLORS = {'HydraRoute':'badge-blue','RU':'badge-yellow','Google':'badge-green'};
function pcolor(p){return POLICY_COLORS[p]||'badge-blue'}

function showTab(t){
  document.getElementById('tab-view').style.display=t==='view'?'':'none';
  document.getElementById('tab-import').style.display=t==='import'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='view'?i===0:i===1)));
  if(t==='import') loadExport();
}

async function loadConfig(){
  const r=await(await fetch('/api/hydra/config')).json();
  const ver=await(await fetch('/api/hydra/version')).text();
  document.getElementById('ver').textContent='v: '+ver;

  // Domain groups
  const dg=document.getElementById('domain-groups');
  document.getElementById('dg-count').textContent=r.domain_groups.length;
  dg.innerHTML=r.domain_groups.map(g=>`
    <div class="group">
      <div class="group-head">
        <span class="group-name">${g.name}</span>
        <span class="badge ${pcolor(g.policy)}">${g.policy}${g.enabled?'':' OFF'}</span>
      </div>
      <div class="entries">${g.entries.join('<br>')}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">${g.entries.length} записей · ${g.entry_type}</div>
    </div>`).join('');

  // IP groups
  const ig=document.getElementById('ip-groups');
  document.getElementById('ig-count').textContent=r.ip_groups.length;
  ig.innerHTML=r.ip_groups.map(g=>`
    <div class="group">
      <div class="group-head">
        <span class="group-name">${g.name}</span>
        <span class="badge ${pcolor(g.policy)}">${g.policy}${g.enabled?'':' OFF'}</span>
      </div>
      <div class="entries">${g.entries.join('<br>')}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">${g.entries.length} записей · ${g.entry_type}</div>
    </div>`).join('');
}

async function loadExport(){
  const dc=await(await fetch('/api/hydra/domain.conf')).text();
  const il=await(await fetch('/api/hydra/ip.list')).text();
  document.getElementById('dc-export').value=dc;
  document.getElementById('il-export').value=il;
}

async function importFiles(){
  const dc=document.getElementById('dc-text').value.trim();
  const il=document.getElementById('il-text').value.trim();
  if(!dc&&!il){sm('im','err','❌ Оба поля пусты');return}
  const b={};if(dc)b.domain_conf=dc;if(il)b.ip_list=il;
  try{
    const r=await fetch('/api/hydra/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
    const j=await r.json();
    sm('im','ok',`✅ Импортировано: ${j.domain_groups} доменных групп, ${j.ip_groups} IP групп · v:${j.version}`);
    loadConfig();
  }catch(e){sm('im','err','❌ '+e)}
}

async function importAndPush(){
  await importFiles();
  setTimeout(pushAll,500);
}

async function pushAll(){
  const btn=document.getElementById('push-btn');
  const log=document.getElementById('push-log');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Обновляю...';
  log.style.display='block';log.textContent='Запуск обновления на всех роутерах...\n';
  try{
    const r=await fetch('/api/hydra/push_all',{method:'POST'});
    const j=await r.json();
    log.textContent='';
    for(const res of j.results){
      const ok=res.status==='ok';
      log.textContent+=`${ok?'✅':'❌'} ${res.router}: ${res.message}\n`;
    }
    log.textContent+=`\nВсего: ${j.ok} успешно, ${j.failed} ошибок`;
  }catch(e){log.textContent='❌ '+e}
  btn.disabled=false;btn.innerHTML='📡 Обновить все роутеры';
}

function sm(id,c,t){const e=document.getElementById(id);e.className='msg '+c;e.textContent=t;e.style.display='block';setTimeout(()=>e.style.display='none',6000)}

loadConfig();
</script></body></html>
