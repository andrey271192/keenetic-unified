<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Статистика</title>
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#86868b;--green:#30d158;--blue:#64d2ff;--orange:#ff9f0a;--purple:#bf5af2}body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:var(--bg);color:var(--text);padding:20px 28px;max-width:1200px;margin:0 auto}a{color:#0a84ff;text-decoration:none}h1{font-size:22px;font-weight:700;margin:8px 0 4px}.sub{font-size:12px;color:var(--muted);margin-bottom:20px}.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}.kpi{background:var(--card);border-radius:14px;padding:16px;text-align:center}.kpi .lb{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px}.kpi .vl{font-size:28px;font-weight:800}.kpi .un{font-size:12px;color:var(--muted)}.kpi.vpn .vl{color:var(--green)}.kpi.vu .vl{color:var(--green)}.kpi.pg .vl{color:var(--orange)}.kpi.ru .vl{color:var(--blue)}.kpi.rp .vl{color:var(--purple)}.cb{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px}.cb h2{font-size:14px;font-weight:700;margin-bottom:14px}canvas{width:100%!important;height:220px!important}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script></head><body>
<a href="/">← На главную</a><h1 id="tt">📊</h1><div class="sub" id="sub"></div><div class="kpis" id="kpis"></div>
<div class="cb"><h2>Скорость (Mbps)</h2><canvas id="c1"></canvas></div>
<div class="cb"><h2>Ping (ms)</h2><canvas id="c2"></canvas></div>
<script>
const name=location.pathname.split('/').pop();document.getElementById('tt').textContent='📊 '+name;
async function load(){const data=await(await fetch('/api/speed/'+name)).json();if(!data.length){document.getElementById('sub').textContent='Нет данных';return}const l=data[data.length-1];document.getElementById('sub').textContent=`${data.length} записей · ${new Date(l.ts).toLocaleString('ru')}`;
document.getElementById('kpis').innerHTML=`<div class="kpi vpn"><div class="lb">↓ VPN</div><div class="vl">${(l.vpn_down||0).toFixed(0)}<span class="un"> Mbps</span></div></div><div class="kpi vu"><div class="lb">↑ VPN</div><div class="vl">${(l.vpn_up||0).toFixed(0)}<span class="un"> Mbps</span></div></div><div class="kpi pg"><div class="lb">VPN Ping</div><div class="vl">${(l.ping||0).toFixed(0)}<span class="un"> ms</span></div></div><div class="kpi ru"><div class="lb">↓ RU</div><div class="vl">${(l.ru_down||0).toFixed(0)}<span class="un"> Mbps</span></div></div><div class="kpi rp"><div class="lb">RU Ping</div><div class="vl">${(l.ru_ping||0).toFixed(0)}<span class="un"> ms</span></div></div>`;
const lb=data.map(d=>new Date(d.ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}));const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#86868b',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#86868b',font:{size:10}},grid:{color:'rgba(255,255,255,.06)'}}}};
new Chart(document.getElementById('c1'),{type:'line',data:{labels:lb,datasets:[{data:data.map(d=>d.vpn_down||0),borderColor:'#30d158',backgroundColor:'rgba(48,209,88,.08)',fill:true,tension:.3,borderWidth:2,pointRadius:2},{data:data.map(d=>d.ru_down||0),borderColor:'#64d2ff',backgroundColor:'rgba(100,210,255,.08)',fill:true,tension:.3,borderWidth:2,pointRadius:2}]},options:o});
new Chart(document.getElementById('c2'),{type:'line',data:{labels:lb,datasets:[{data:data.map(d=>d.ping||0),borderColor:'#ff9f0a',tension:.3,borderWidth:2,pointRadius:2},{data:data.map(d=>d.ru_ping||0),borderColor:'#bf5af2',tension:.3,borderWidth:2,pointRadius:2}]},options:o})}
load()
</script></body></html>
